name: CI

# push / PR でユニットテスト・層境界・ビルド・スモークを自動実行する。
# 設計移行（Clean Architecture）の回帰と、コミット済み dist のスタンプ漏れを止める。

on:
  push:
    branches: [main]
  pull_request:

permissions:
  contents: read

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Unit tests
        run: npm test

      - name: Architecture boundaries
        run: npm run arch

      - name: Build bundles
        run: npm run build

      - name: Verify committed dist is up to date
        run: |
          if ! git diff --quiet -- docs/dist docs/index.html; then
            echo "::error::docs/dist or docs/index.html is stale. Run 'npm run build' and commit the result." >&2
            git --no-pager diff --stat -- docs/dist docs/index.html
            exit 1
          fi

      - name: Smoke test
        run: npm run smoke
