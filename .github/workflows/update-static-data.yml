name: Update static data

on:
  workflow_dispatch:
    inputs:
      source:
        description: Request source
        required: false
        default: manual
      requested_at:
        description: Request timestamp
        required: false
        default: ''
      environment:
        description: Target data environment
        required: false
        default: production
        type: choice
        options:
          - production
          - staging

permissions:
  contents: write

concurrency:
  group: update-static-data-${{ github.event.inputs.environment || 'production' }}
  cancel-in-progress: false

jobs:
  update-static-data:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.ref_name }}

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Select Cloudflare D1 credentials
        env:
          TARGET_ENV: ${{ github.event.inputs.environment || 'production' }}
          CLOUDFLARE_API_TOKEN_PRODUCTION: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          CLOUDFLARE_ACCOUNT_ID_PRODUCTION: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_D1_DATABASE_ID_PRODUCTION: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID }}
          CLOUDFLARE_API_TOKEN_STAGING: ${{ secrets.CLOUDFLARE_API_TOKEN_STG }}
          CLOUDFLARE_ACCOUNT_ID_STAGING: ${{ secrets.CLOUDFLARE_ACCOUNT_ID_STG }}
          CLOUDFLARE_D1_DATABASE_ID_STAGING: ${{ secrets.CLOUDFLARE_D1_DATABASE_ID_STG }}
        run: |
          if [ "$TARGET_ENV" = "staging" ]; then
            if [ -z "$CLOUDFLARE_API_TOKEN_STAGING" ] || [ -z "$CLOUDFLARE_D1_DATABASE_ID_STAGING" ]; then
              echo "Missing staging secrets: CLOUDFLARE_API_TOKEN_STG and CLOUDFLARE_D1_DATABASE_ID_STG are required." >&2
              exit 1
            fi
            echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN_STAGING" >> "$GITHUB_ENV"
            echo "CLOUDFLARE_ACCOUNT_ID=${CLOUDFLARE_ACCOUNT_ID_STAGING:-$CLOUDFLARE_ACCOUNT_ID_PRODUCTION}" >> "$GITHUB_ENV"
            echo "CLOUDFLARE_D1_DATABASE_ID=$CLOUDFLARE_D1_DATABASE_ID_STAGING" >> "$GITHUB_ENV"
          else
            if [ -z "$CLOUDFLARE_API_TOKEN_PRODUCTION" ] || [ -z "$CLOUDFLARE_ACCOUNT_ID_PRODUCTION" ] || [ -z "$CLOUDFLARE_D1_DATABASE_ID_PRODUCTION" ]; then
              echo "Missing production secrets: CLOUDFLARE_API_TOKEN, CLOUDFLARE_ACCOUNT_ID, and CLOUDFLARE_D1_DATABASE_ID are required." >&2
              exit 1
            fi
            echo "CLOUDFLARE_API_TOKEN=$CLOUDFLARE_API_TOKEN_PRODUCTION" >> "$GITHUB_ENV"
            echo "CLOUDFLARE_ACCOUNT_ID=$CLOUDFLARE_ACCOUNT_ID_PRODUCTION" >> "$GITHUB_ENV"
            echo "CLOUDFLARE_D1_DATABASE_ID=$CLOUDFLARE_D1_DATABASE_ID_PRODUCTION" >> "$GITHUB_ENV"
          fi

      - name: Generate docs/data JSON
        run: node tools/generate_static_data.mjs

      - name: Commit and push static data
        env:
          TARGET_ENV: ${{ github.event.inputs.environment || 'production' }}
          TARGET_REF: ${{ github.ref_name }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add docs/data/meta.json docs/data/songs.json docs/data/streams.json
          if git diff --cached --quiet; then
            echo "No static data changes."
          else
            git commit -m "Update ${TARGET_ENV} static data"
            git push origin "HEAD:${TARGET_REF}"
          fi
